version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: reactive-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: reactive_orders_db
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
